<script>
  // Hiệu ứng typewriter LOOP cho câu mô tả
  document.addEventListener('DOMContentLoaded', function() {
    const text = "2011, đếch biết sợ và thích bị ăn đòn";
    const excerptEl = document.querySelector('.excerpt');
    
    if (!excerptEl) {
      console.log('Không tìm thấy .excerpt');
      return;
    }
    
    let index = 0;
    let isDeleting = false;
    
    // Xóa nội dung gốc
    excerptEl.textContent = '';
    
    function typeLoop() {
      if (isDeleting) {
        // Đang xóa
        if (index > 0) {
          excerptEl.textContent = text.substring(0, index - 1);
          index--;
          setTimeout(typeLoop, 50);
        } else {
          // Xóa xong, chuyển sang gõ lại
          isDeleting = false;
          setTimeout(typeLoop, 500);
        }
      } else {
        // Đang gõ
        if (index <= text.length) {
          excerptEl.textContent = text.substring(0, index);
          index++;
          setTimeout(typeLoop, 100);
        } else {
          // Gõ xong, chờ 2 giây rồi xóa
          isDeleting = true;
          setTimeout(typeLoop, 2000);
        }
      }
    }
    
    typeLoop();
  });
</script>
<script>
  // Hiệu ứng title typewriter (gõ → xóa → gõ câu khác)
  const titles = [
    "@ngochaodz"
  ];
  
  let phraseIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  
  function typeTitle() {
    const currentPhrase = titles[phraseIndex];
    
    if (isDeleting) {
      document.title = currentPhrase.substring(0, charIndex - 1);
      charIndex--;
      if (charIndex === 0) {
        isDeleting = false;
        phraseIndex = (phraseIndex + 1) % titles.length;
        setTimeout(typeTitle, 0);
      } else {
        setTimeout(typeTitle, 300);
      }
    } else {
      document.title = currentPhrase.substring(0, charIndex + 1);
      charIndex++;
      if (charIndex === currentPhrase.length) {
        isDeleting = true;
        setTimeout(typeTitle, 300);
      } else {
        setTimeout(typeTitle, 300);
      }
    }
  }
  
  document.addEventListener('DOMContentLoaded', function() {
    document.title = "";
    typeTitle();
  });
</script>

<script>
  // Copy từng dòng (sửa lỗi event)
  function copyText(elementId, btnElement) {
    const textElement = document.getElementById(elementId);
    const textToCopy = textElement.textContent;
    
    navigator.clipboard.writeText(textToCopy).then(function() {
      const originalText = btnElement.textContent;
      btnElement.textContent = '✅ Copied!';
      btnElement.style.background = 'rgba(0,200,0,0.3)';
      
      setTimeout(function() {
        btnElement.textContent = originalText;
        btnElement.style.background = 'rgba(255,255,255,0.15)';
      }, 1500);

<script>
  // Tạo hiệu ứng ripple khi chạm vào bất kỳ đâu trên trang
  function createRipple(x, y) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple-effect';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    document.body.appendChild(ripple);
    
    // Tự động xóa ripple sau 0.6 giây
    setTimeout(() => {
      ripple.remove();
    }, 600);
  }
  
  // Bắt sự kiện click chuột (máy tính)
  document.addEventListener('click', function(e) {
    createRipple(e.clientX, e.clientY);
  });
  
  // Bắt sự kiện chạm (điện thoại)
  document.addEventListener('touchstart', function(e) {
    const touch = e.touches[0];
    createRipple(touch.clientX, touch.clientY);
  });
</script>

    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    // PC: cập nhật vị trí chuột
    if (!isMobile) {
      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        if (!cursorVisible) {
          cursor.style.display = 'block';
          cursorVisible = true;
        }
        
        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';
      });
      
      document.addEventListener('mouseleave', function() {
        cursor.style.display = 'none';
        cursorVisible = false;
      });
    } else {
      if (cursor) cursor.style.display = 'none';
    }
    
    // Hàm xóa ảnh cũ nhất nếu quá 3
    function removeOldestImage() {
      if (imagesArray.length >= MAX_IMAGES) {
        const oldest = imagesArray.shift();
        const oldestTimeout = timeoutsArray.shift();
        if (oldestTimeout) clearTimeout(oldestTimeout);
        if (oldest) {
          oldest.style.transform = 'translate(-50%, -50%) scale(1.2)';
          oldest.style.opacity = '0';
          setTimeout(() => { if (oldest) oldest.remove(); }, 300);
        }
      }
    }
    
    // Hàm hiển thị ảnh
    function showPersistentImage(x, y) {
      removeOldestImage();
      
      const currentImage = document.createElement('div');
      currentImage.style.position = 'fixed';
      currentImage.style.left = x + 'px';
      currentImage.style.top = y + 'px';
      currentImage.style.width = '40px';
      currentImage.style.height = '40px';
      currentImage.style.transform = 'translate(-50%, -50%) scale(0)';
      currentImage.style.pointerEvents = 'none';
      currentImage.style.zIndex = '999998';
      currentImage.style.transition = 'all 0.3s ease-out';
      
      const img = document.createElement('img');
      img.src = cursorImageSrc;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'contain';
      img.style.filter = 'none';
      
      currentImage.appendChild(img);
      document.body.appendChild(currentImage);
      
      setTimeout(() => {
        if (currentImage) {
          currentImage.style.transform = 'translate(-50%, -50%) scale(1)';
        }
      }, 10);
      
      imagesArray.push(currentImage);
      
      const timeout = setTimeout(() => {
        const index = imagesArray.indexOf(currentImage);
        if (index > -1) {
          imagesArray.splice(index, 1);
          timeoutsArray.splice(index, 1);
        }
        if (currentImage) {
          currentImage.style.transform = 'translate(-50%, -50%) scale(1.2)';
          currentImage.style.opacity = '0';
          setTimeout(() => {
            if (currentImage) currentImage.remove();
          }, 300);
        }
      }, 3000);
      
      timeoutsArray.push(timeout);
    }
    
    // Hiệu ứng khi click chuột (PC)
    if (!isMobile) {
      document.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
          cursor.classList.add('click');
          showPersistentImage(mouseX, mouseY);
          
          setTimeout(() => {
            cursor.classList.remove('click');
          }, 200);
        }
      });
    }
    
    // Hiệu ứng khi chạm (điện thoại) - KHÔNG chặn sự kiện
    let touchTimeout;
    let lastTouchTime = 0;
    
    document.addEventListener('touchstart', function(e) {
      // KHÔNG dùng e.preventDefault() để không chặn click
      const now = Date.now();
      if (now - lastTouchTime < 500) return;
      lastTouchTime = now;
      
      const touch = e.touches[0];
      const touchX = touch.clientX;
      const touchY = touch.clientY;
      
      showPersistentImage(touchX, touchY);
      
      if (navigator.vibrate) navigator.vibrate(50);
    }); // Đã xóa { passive: false }
    
    // Ẩn chuột khi rời khỏi cửa sổ (PC)
    if (!isMobile) {
      document.addEventListener('mouseleave', function() {
        cursor.style.display = 'none';
        cursorVisible = false;
      });
    }
    
    // Khi chuột di chuyển qua link (PC)
    if (!isMobile) {
      const allLinks = document.querySelectorAll('a, button, .info-btn, .social li, .avatar');
      allLinks.forEach(link => {
        link.addEventListener('mouseenter', () => {
          if (cursor) cursor.style.transform = 'translate(-50%, -50%) scale(1.1)';
        });
        link.addEventListener('mouseleave', () => {
          if (cursor) cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
      });
    }
  })();
</script>

    panel.addEventListener('mousemove', function(e) {

      const xPercent = (x / bounds.width) * 100;
      const yPercent = (y / bounds.height) * 100;
      
      const xRotate = (50 - xPercent) / 5;
      const yRotate = (50 - yPercent) / 5;
      
      panel.style.transform = `perspective(1000px) rotateY(${xRotate}deg) rotateX(${-yRotate}deg) scale3d(1.02, 1.02, 1.02)`;
    });
    
    panel.addEventListener('mouseleave', function() {
      panel.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
    });
  })();

      return { x: rect.left, y: rect.top };
    }
    
    // Bắt đầu kéo
    function onStart(e) {
      e.preventDefault();
      isDragging = true;
      
      // Lấy vị trí chuột/touch
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      const pos = getAvatarPosition();
      startX = clientX - pos.x;
      startY = clientY - pos.y;
      
      // Chuyển sang fixed positioning
      avatar.style.position = 'fixed';
      avatar.style.left = pos.x + 'px';
      avatar.style.top = pos.y + 'px';
      avatar.style.margin = '0';
      avatar.classList.add('dragging');
      
      console.log('Bắt đầu kéo tại:', pos.x, pos.y);
    }
    
    // Di chuyển
    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      let newX = clientX - startX;
      let newY = clientY - startY;
      
      // Giới hạn trong màn hình
      newX = Math.min(Math.max(0, newX), window.innerWidth - avatar.offsetWidth);

      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';

      if (isDragging) {
        isDragging = false;

      }

    audioPlayer.loop = false;
  }
  
  // DOM elements
  const musicMainBtn = document.getElementById('musicMainBtn');
  const musicPanel = document.getElementById('musicPanel');
  const volumeSlider = document.getElementById('volumeSlider');
  console.log('volumeSlider:', volumeSlider);  // Kiểm tra có tìm thấy element không

  const nextBtn = document.getElementById('nextBtn');
  const progressBar = document.getElementById('progressBar');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const currentSongNameEl = document.getElementById('currentSongName');

  // Tải bài hát
  function loadSong(index) {
    const song = playlist[index];
    if (!song) return;
    
    audioPlayer.src = song.src;
    currentSongNameEl.textContent = song.name;
    audioPlayer.load();
    
    playPauseBtn.textContent = '▶';
    isPlaying = false;
  }
  
  // Play/Pause
  function togglePlayPause() {
    if (isPlaying) {
      audioPlayer.pause();
      playPauseBtn.textContent = '▶';
    } else {
      audioPlayer.play().catch(e => console.log('Cần tương tác để phát nhạc'));
      playPauseBtn.textContent = '⏸';
    }
    isPlaying = !isPlaying;
  }

 // Bài tiếp theo

}

// Bài trước: nếu dưới 10s thì chuyển bài, nếu trên 10s thì tua đầu
function prevSong() {

  if (currentTime < 10) {
    // Chuyển bài trước
    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;

  } else {
    // Tua về đầu bài hiện tại

      // Nếu đang dừng thì vẫn dừng

  }
}
  
  // Format thời gian
  function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }
  
  // Cập nhật thanh tiến trình
  function updateProgress() {

      const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
      if (progressBar) progressBar.value = percent;
      if (currentTimeEl) currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
      if (durationEl) durationEl.textContent = formatTime(audioPlayer.duration);
    }
  }
  
  // Tua nhạc
  function seekTo() {
    if (audioPlayer.duration && !isNaN(audioPlayer.duration)) {
      audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
    }
  }
  
  // Khi bài hát kết thúc (CHỈ 1 HÀM DUY NHẤT)
  // Khi bài hát kết thúc - chuyển bài tiếp theo và tự động phát
function onEnded() {
  console.log("Bài hát kết thúc, chuyển bài tiếp theo"); // Kiểm tra log
  currentIndex = (currentIndex + 1) % playlist.length;
  loadSong(currentIndex);
  
  // Tự động phát bài mới
  setTimeout(() => {
    audioPlayer.play().catch(e => console.log('Tự động phát bị chặn:', e));
    playPauseBtn.textContent = '⏸';
    isPlaying = true;
  }, 100);
}

// ĐẢM BẢO DÒNG NÀY TỒN TẠI (gắn sự kiện ended)
audioPlayer.addEventListener('ended', onEnded);
  
  // Bật/tắt âm lượng (nút mute)
 function toggleMute() {
  if (!audioPlayer) return;

  if (isMuted) {
    // 🔊 BẬT LẠI ÂM
    audioPlayer.muted = false;                  // QUAN TRỌNG
    audioPlayer.volume = lastVolume || 0.7;     // trả lại âm lượng cũ
    
    if (volumeSlider) volumeSlider.value = audioPlayer.volume * 100;
    if (muteBtn) muteBtn.textContent = '🔊';
    if (musicMainBtn) musicMainBtn.textContent = '🔊';

    isMuted = false;
    
  } else {
    // 🔇 TẮT ÂM
    lastVolume = audioPlayer.volume;            // lưu lại âm lượng
    
    audioPlayer.muted = true;                   // 🔥 PHẢI CÓ (fix mobile)
    audioPlayer.volume = 0;
    
    if (volumeSlider) volumeSlider.value = 0;
    if (muteBtn) muteBtn.textContent = '🔇';
    if (musicMainBtn) musicMainBtn.textContent = '🔇';

    isMuted = true;
  }
}
  
  // Điều chỉnh âm lượng (thanh kéo)
 function setVolume() {
  const value = volumeSlider.value / 100;
  console.log('Âm lượng:', value);  // Kiểm tra xem hàm có chạy không
  
  if (audioPlayer) {
    audioPlayer.volume = value;
    audioPlayer.muted = (value === 0);
  }
  
  if (value === 0) {
    if (muteBtn) muteBtn.textContent = '🔇';
    if (musicMainBtn) musicMainBtn.textContent = '🔇';
    isMuted = true;
  } else {
    if (muteBtn) muteBtn.textContent = '🔊';
    if (musicMainBtn) musicMainBtn.textContent = '🔊';
    isMuted = false;
    lastVolume = value;
  }
}
  
  // Bấm nút chính: hiện/ẩn panel
  if (musicMainBtn) {
    musicMainBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (musicPanel.style.display === 'none' || musicPanel.style.display === '') {
        musicPanel.style.display = 'block';
      } else {
        musicPanel.style.display = 'none';
      }
    });
  }
  
  // Gắn sự kiện
  if (prevBtn) prevBtn.addEventListener('click', prevSong);
  if (playPauseBtn) playPauseBtn.addEventListener('click', togglePlayPause);
  if (nextBtn) nextBtn.addEventListener('click', nextSong);
  if (progressBar) progressBar.addEventListener('input', seekTo);
  if (volumeSlider) volumeSlider.addEventListener('input', setVolume);
  // ===== THÊM CÁC DÒNG NÀY VÀO ĐÂY =====
if (volumeSlider) {
  volumeSlider.addEventListener('change', setVolume);      // Thêm change
  volumeSlider.addEventListener('touchend', function() {   // Thêm cho mobile
    setVolume();
  });
   volumeSlider.addEventListener('touchmove', function(e) {
    setVolume();
  });
}
  if (muteBtn) muteBtn.addEventListener('click', toggleMute);
  
  // Gắn sự kiện cho audio
  audioPlayer.addEventListener('timeupdate', updateProgress);
  audioPlayer.addEventListener('ended', onEnded);
  audioPlayer.addEventListener('loadedmetadata', () => {
    if (durationEl) durationEl.textContent = formatTime(audioPlayer.duration);
  });
  
  // Cập nhật trạng thái play/pause từ audio
  audioPlayer.addEventListener('play', () => {
    playPauseBtn.textContent = '⏸';
    isPlaying = true;
  });
  
  audioPlayer.addEventListener('pause', () => {
    playPauseBtn.textContent = '▶';
    isPlaying = false;
  });
  
  // Bấm ra ngoài để ẩn panel
  document.addEventListener('click', function(e) {
    if (musicPanel && musicMainBtn) {
      if (!musicMainBtn.contains(e.target) && !musicPanel.contains(e.target)) {
        musicPanel.style.display = 'none';
      }
    }
  });
  
  // Khởi tạo bài đầu
  loadSong(0);
</script>
