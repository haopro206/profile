  <audio id="bgmusic" src="music.mp3" loop preload="auto" muted></audio>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var bgmusic = document.getElementById('bgmusic');
      if (bgmusic) {
        bgmusic.muted = true;
        bgmusic.play().catch(function (error) {
          console.warn('Autoplay blocked (muted attempt):', error);
        });
      }
    });

    function enterWeb() {
      var intro = document.getElementById('intro');
      intro.style.opacity = '0';
      setTimeout(function() {
        intro.style.display = 'none';
        var main = document.getElementById('main');
        main.style.display = 'block';
        main.style.opacity = '0';
        setTimeout(function() {
          main.style.opacity = '1';
          var bgmusic = document.getElementById('bgmusic');
          if (bgmusic) {
            bgmusic.muted = false;
            bgmusic.play().catch(function (error) {
              console.warn('Play after enterWeb blocked:', error);
            });
          }
        }, 10);
      }, 1000);
    }

    function unlockAudio() {
      var bgmusic = document.getElementById('bgmusic');
      if (bgmusic) {
        bgmusic.muted = false;
        bgmusic.play().catch(function (error) {
          console.warn('unlockAudio play blocked:', error);
        });
      }
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('keydown', unlockAudio);
    }

    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('keydown', unlockAudio, { once: true });
    document.addEventListener('keydown', enterWeb);
    document.getElementById('intro').addEventListener('click', enterWeb);
  </script>
