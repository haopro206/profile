<script>
  // Hiệu ứng typewriter LOOP cho câu mô tả
  document.addEventListener('DOMContentLoaded', function() {
    const text = "2011, đếch biết sợ và thích bị ăn đòn.";
    const excerptEl = document.querySelector('.excerpt');
    
    if (!excerptEl) {
      console.log('Không tìm thấy .excerpt');
      return;
    }
    
    let index = 0;
    let isDeleting = false;
    
    // Xóa nội dung gốc
    excerptEl.textContent = '';
    
    function typeLoop() {
      if (isDeleting) {
        // Đang xóa
        if (index > 0) {
          excerptEl.textContent = text.substring(0, index - 1);
          index--;
          setTimeout(typeLoop, 50);
        } else {
          // Xóa xong, chuyển sang gõ lại
          isDeleting = false;
          setTimeout(typeLoop, 500);
        }
      } else {
        // Đang gõ
        if (index <= text.length) {
          excerptEl.textContent = text.substring(0, index);
          index++;
          setTimeout(typeLoop, 100);
        } else {
          // Gõ xong, chờ 2 giây rồi xóa
          isDeleting = true;
          setTimeout(typeLoop, 2000);
        }
      }
    }
    
    typeLoop();
  });
</script>
<script>
  // Hiệu ứng title typewriter (gõ → xóa → gõ câu khác)
  const titles = [
    "@ngochaodz"
  ];
  
  let phraseIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  
  function typeTitle() {
    const currentPhrase = titles[phraseIndex];
    
    if (isDeleting) {
      document.title = currentPhrase.substring(0, charIndex - 1);
      charIndex--;
      if (charIndex === 0) {
        isDeleting = false;
        phraseIndex = (phraseIndex + 1) % titles.length;
        setTimeout(typeTitle, 0);
      } else {
        setTimeout(typeTitle, 300);
      }
    } else {
      document.title = currentPhrase.substring(0, charIndex + 1);
      charIndex++;
      if (charIndex === currentPhrase.length) {
        isDeleting = true;
        setTimeout(typeTitle, 300);
      } else {
        setTimeout(typeTitle, 300);
      }
    }
  }
  
  document.addEventListener('DOMContentLoaded', function() {
    document.title = "";
    typeTitle();
  });
</script>

<script>
  // Copy từng dòng (sửa lỗi event)
  function copyText(elementId, btnElement) {
    const textElement = document.getElementById(elementId);
    const textToCopy = textElement.textContent;
    
    navigator.clipboard.writeText(textToCopy).then(function() {
      const originalText = btnElement.textContent;
      btnElement.textContent = '✅ Copied!';
      btnElement.style.background = 'rgba(0,200,0,0.3)';
      
      setTimeout(function() {
        btnElement.textContent = originalText;
        btnElement.style.background = 'rgba(255,255,255,0.15)';
      }, 1500);
    }).catch(function(err) {
      alert('Không thể copy: ' + err);

<script>
  // Tạo hiệu ứng ripple khi chạm vào bất kỳ đâu trên trang
  function createRipple(x, y) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple-effect';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    document.body.appendChild(ripple);
    
    // Tự động xóa ripple sau 0.6 giây
    setTimeout(() => {
      ripple.remove();
    }, 600);
  }
  
  // Bắt sự kiện click chuột (máy tính)
  document.addEventListener('click', function(e) {
    createRipple(e.clientX, e.clientY);
  });
  
  // Bắt sự kiện chạm (điện thoại)
  document.addEventListener('touchstart', function(e) {
    const touch = e.touches[0];
    createRipple(touch.clientX, touch.clientY);
  });
</script>

    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    // PC: cập nhật vị trí chuột
    if (!isMobile) {
      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        if (!cursorVisible) {
          cursor.style.display = 'block';
          cursorVisible = true;
        }
        
        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';
      });
      
      document.addEventListener('mouseleave', function() {
        cursor.style.display = 'none';
        cursorVisible = false;
      });
    } else {
      if (cursor) cursor.style.display = 'none';
    }
    
    // Hàm xóa ảnh cũ nhất nếu quá 3
    function removeOldestImage() {
      if (imagesArray.length >= MAX_IMAGES) {
        const oldest = imagesArray.shift();
        const oldestTimeout = timeoutsArray.shift();
        if (oldestTimeout) clearTimeout(oldestTimeout);
        if (oldest) {
          oldest.style.transform = 'translate(-50%, -50%) scale(1.2)';
          oldest.style.opacity = '0';
          setTimeout(() => { if (oldest) oldest.remove(); }, 300);
        }
      }
    }
    
    // Hàm hiển thị ảnh
    function showPersistentImage(x, y) {
      removeOldestImage();
      
      const currentImage = document.createElement('div');
      currentImage.style.position = 'fixed';
      currentImage.style.left = x + 'px';
      currentImage.style.top = y + 'px';
      currentImage.style.width = '40px';
      currentImage.style.height = '40px';
      currentImage.style.transform = 'translate(-50%, -50%) scale(0)';
      currentImage.style.pointerEvents = 'none';
      currentImage.style.zIndex = '999998';
      currentImage.style.transition = 'all 0.3s ease-out';
      
      const img = document.createElement('img');
      img.src = cursorImageSrc;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'contain';
      img.style.filter = 'none';
      
      currentImage.appendChild(img);
      document.body.appendChild(currentImage);
      
      setTimeout(() => {
        if (currentImage) {
          currentImage.style.transform = 'translate(-50%, -50%) scale(1)';
        }
      }, 10);
      
      imagesArray.push(currentImage);
      
      const timeout = setTimeout(() => {
        const index = imagesArray.indexOf(currentImage);
        if (index > -1) {
          imagesArray.splice(index, 1);
          timeoutsArray.splice(index, 1);
        }
        if (currentImage) {
          currentImage.style.transform = 'translate(-50%, -50%) scale(1.2)';
          currentImage.style.opacity = '0';
          setTimeout(() => {
            if (currentImage) currentImage.remove();
          }, 300);
        }
      }, 3000);
      
      timeoutsArray.push(timeout);
    }
    
    // Hiệu ứng khi click chuột (PC)
    if (!isMobile) {
      document.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
          cursor.classList.add('click');
          showPersistentImage(mouseX, mouseY);
          
          setTimeout(() => {
            cursor.classList.remove('click');
          }, 200);
        }
      });
    }
    
    // Hiệu ứng khi chạm (điện thoại) - KHÔNG chặn sự kiện
    let touchTimeout;
    let lastTouchTime = 0;
    
    document.addEventListener('touchstart', function(e) {
      // KHÔNG dùng e.preventDefault() để không chặn click
      const now = Date.now();
      if (now - lastTouchTime < 500) return;
      lastTouchTime = now;
      
      const touch = e.touches[0];
      const touchX = touch.clientX;
      const touchY = touch.clientY;
      
      showPersistentImage(touchX, touchY);
      
      if (navigator.vibrate) navigator.vibrate(50);
    }); // Đã xóa { passive: false }
    
    // Ẩn chuột khi rời khỏi cửa sổ (PC)
    if (!isMobile) {
      document.addEventListener('mouseleave', function() {
        cursor.style.display = 'none';
        cursorVisible = false;
      });
    }
    
    // Khi chuột di chuyển qua link (PC)
    if (!isMobile) {
      const allLinks = document.querySelectorAll('a, button, .info-btn, .social li, .avatar');
      allLinks.forEach(link => {
        link.addEventListener('mouseenter', () => {
          if (cursor) cursor.style.transform = 'translate(-50%, -50%) scale(1.1)';
        });
        link.addEventListener('mouseleave', () => {
          if (cursor) cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
      });
    }
  })();
</script>
<script>
  // Hiệu ứng 3D xoay theo chuột cho bảng thông tin
  (function() {
    const panel = document.querySelector('#infoPanel > div');
    if (!panel) return;
    
    let bounds = panel.getBoundingClientRect();
    
    window.addEventListener('resize', () => {
      bounds = panel.getBoundingClientRect();
    });
    
    panel.addEventListener('mousemove', function(e) {
      const x = e.clientX - bounds.left;
      const y = e.clientY - bounds.top;
      
      const xPercent = (x / bounds.width) * 100;
      const yPercent = (y / bounds.height) * 100;
      
      const xRotate = (50 - xPercent) / 5;
      const yRotate = (50 - yPercent) / 5;
      
      panel.style.transform = `perspective(1000px) rotateY(${xRotate}deg) rotateX(${-yRotate}deg) scale3d(1.02, 1.02, 1.02)`;
    });
    
    panel.addEventListener('mouseleave', function() {
      panel.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
    });
  })();
</script>

    let offsetX, offsetY;

    avatar.addEventListener('mousedown', function(e) {
      isDragging = true;
      startX = e.clientX;

      // Lấy vị trí hiện tại của avatar
      const rect = avatar.getBoundingClientRect();
      offsetX = startX - rect.left;
      offsetY = startY - rect.top;
      
      avatar.style.cursor = 'grabbing';
      avatar.style.transition = 'none';
      e.preventDefault();
    });
    
    // Di chuyển (chuột)
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      
      let newX = e.clientX - offsetX;
      let newY = e.clientY - offsetY;
      
      // Giới hạn trong màn hình
      const maxX = window.innerWidth - avatar.offsetWidth;
      const maxY = window.innerHeight - avatar.offsetHeight;
      newX = Math.min(Math.max(0, newX), maxX);
      newY = Math.min(Math.max(0, newY), maxY);
      
      avatar.style.position = 'fixed';
      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';
      avatar.style.margin = '0';
      avatar.style.zIndex = '1000';
    });
    
    // Thả chuột
    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        avatar.style.cursor = 'grab';
        avatar.style.transition = 'transform 0.2s';
      }
    });
    
    // Hỗ trợ chạm trên điện thoại
    avatar.addEventListener('touchstart', function(e) {

      avatar.style.transition = 'none';

<script>
  (function() {
    const avatar = document.querySelector('.avatar');
    if (!avatar) {
      console.log('Không tìm thấy avatar');
      return;
    }
    
    let isDragging = false;
    let startX = 0, startY = 0;
    let initialLeft = 0, initialTop = 0;
    
    // Hàm lấy vị trí hiện tại của avatar
    function getAvatarPosition() {
      const rect = avatar.getBoundingClientRect();
      return { x: rect.left, y: rect.top };
    }
    
    // Bắt đầu kéo
    function onStart(e) {
      e.preventDefault();
      isDragging = true;
      
      // Lấy vị trí chuột/touch
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      const pos = getAvatarPosition();
      startX = clientX - pos.x;
      startY = clientY - pos.y;
      
      // Chuyển sang fixed positioning
      avatar.style.position = 'fixed';
      avatar.style.left = pos.x + 'px';
      avatar.style.top = pos.y + 'px';
      avatar.style.margin = '0';
      avatar.classList.add('dragging');
      
      console.log('Bắt đầu kéo tại:', pos.x, pos.y);
    }
    
    // Di chuyển
    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      let newX = clientX - startX;
      let newY = clientY - startY;
      
      // Giới hạn trong màn hình
      newX = Math.min(Math.max(0, newX), window.innerWidth - avatar.offsetWidth);
      newY = Math.min(Math.max(0, newY), window.innerHeight - avatar.offsetHeight);
      
      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';
    }
    
    // Kết thúc kéo
    function onEnd() {
      if (isDragging) {
        isDragging = false;
        avatar.classList.remove('dragging');
        console.log('Kết thúc kéo, vị trí:', avatar.style.left, avatar.style.top);
      }
    }
    
    // Gắn sự kiện chuột
    avatar.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    
    // Gắn sự kiện chạm (điện thoại)
    avatar.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    
    avatar.style.cursor = 'grab';
  })();
</script>

    let audioPlayer = document.getElementById('bgmusic');
    
    if (!audioPlayer) {
      audioPlayer = new Audio();
      audioPlayer.src = "music.mp3";
      audioPlayer.loop = true;
    }
    
    let isMuted = false;
    let lastVolume = audioPlayer.volume || 0.7;
    
    // Đường dẫn 2 file PNG
    const SOUND_ON = "sound-on.png";
    const SOUND_OFF = "sound-off.png";
    
    function toggleMute() {
      if (isMuted) {
        // BẬT LẠI ÂM
        audioPlayer.muted = false;
        audioPlayer.volume = lastVolume;
        soundIcon.src = SOUND_ON;
        console.log("Bật âm, volume:", lastVolume);
      } else {
        // TẮT ÂM
        lastVolume = audioPlayer.volume;
        audioPlayer.muted = true;
        audioPlayer.volume = 0;
        soundIcon.src = SOUND_OFF;
        console.log("Tắt âm");
      }
      isMuted = !isMuted;
    }
    
    if (soundBtn) {
      soundBtn.addEventListener('click', toggleMute);
      soundBtn.addEventListener('touchstart', toggleMute);
    }
    
    // Khởi tạo icon đúng trạng thái
    if (audioPlayer.muted === true || audioPlayer.volume === 0) {
      soundIcon.src = SOUND_ON;
      isMuted = true;
    } else {
      soundIcon.src = SOUND_OFF;
      isMuted = false;
    }
  })();
